{% extends "layout.html" %}
{% block title %}Admin - Recap Hardware{% endblock %}
{% block header_title %}Kelola User{% endblock %}
{% block content %}

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <div></div>
    <button onclick="openModal()" class="btn btn-primary">+ Tambah User</button>
</div>

<div class="card">
    <div class="table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Nama Lengkap</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Dibuat</th>
                    <th class="col-actions"></th>
                </tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>
    <div class="empty-state" id="emptyMsg" style="display:none;">
        <div class="empty-state-icon">👥</div>
        <div class="empty-state-text">Belum ada user. Tambahkan user pertama!</div>
    </div>
</div>

<!-- MODAL FORM -->
<div class="modal-overlay" id="userModal" style="display:none;" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">Tambah User</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <form id="userForm">
            <input type="hidden" id="editId">

            <div class="form-group" style="margin-bottom:16px;">
                <label>Username <span style="color:var(--red-text);">*</span></label>
                <input type="text" id="formUsername" class="form-control" placeholder="Username login" required>
            </div>

            <div class="form-group" style="margin-bottom:16px;">
                <label>Password <span id="passwordRequired" style="color:var(--red-text);">*</span></label>
                <input type="password" id="formPassword" class="form-control" placeholder="Password login">
            </div>

            <div class="form-group" style="margin-bottom:16px;">
                <label>Nama Lengkap <span style="color:var(--red-text);">*</span></label>
                <input type="text" id="formNama" class="form-control" placeholder="Nama lengkap user" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Role</label>
                    <select id="formRole" class="form-control">
                        <option value="PIC">PIC</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="formStatus" class="form-control">
                        <option value="true">Aktif</option>
                        <option value="false">Nonaktif</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" onclick="closeModal()" class="btn btn-secondary">Batal</button>
                <button type="submit" class="btn btn-primary" id="saveBtn">Simpan</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="/static/js/admin.js"></script>
{% endblock %}
