{% extends "layout.html" %}
{% block title %}Cabang - Recap Hardware{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Cabang</h2>
    <button onclick="openModal()" class="btn btn-primary">+ Tambah Cabang</button>
</div>

<table class="data-table">
    <thead>
        <tr>
            <th class="col-number">No</th>
            <th>Kode Cabang</th>
            <th>Inisial Cabang</th>
            <th>Nama Cabang</th>
            <th>Alamat Cabang</th>
            <th class="col-actions"></th>
        </tr>
    </thead>
    <tbody id="cabangTable">
    </tbody>
</table>
<p id="emptyMsg" class="text-muted text-center" style="display:none;">Belum ada data cabang.</p>

<!-- MODAL -->
<div class="modal-overlay" id="cabangModal" style="display:none;">
    <div class="modal">
        <h3 id="modalTitle">Tambah Cabang</h3>
        <form id="cabangForm">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Nama Cabang <span class="text-danger">*</span></label>
                <input type="text" id="formNama" placeholder="Contoh: Cabang Pusat" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Kode Cabang <span class="text-danger">*</span></label>
                    <input type="text" id="formKode" placeholder="Contoh: BR01" required>
                </div>
                <div class="form-group">
                    <label>Inisial Cabang <span class="text-muted">(Opsional)</span></label>
                    <input type="text" id="formInisial" placeholder="Contoh: PUS">
                </div>
            </div>
            <div class="form-group">
                <label>Alamat Cabang <span class="text-muted">(Opsional)</span></label>
                <textarea id="formAlamat" rows="2" placeholder="Alamat lengkap cabang"></textarea>
            </div>
            <p id="formError" class="text-danger" style="display:none;"><small>⚠️ Nama dan Kode Cabang wajib diisi.</small></p>
            <div class="modal-actions">
                <button type="button" onclick="closeModal()" class="btn btn-secondary">Batal</button>
                <button type="submit" class="btn btn-primary" id="saveBtnSubmit">
                    <span id="saveBtn">Simpan</span>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/cabang.js"></script>
{% endblock %}
