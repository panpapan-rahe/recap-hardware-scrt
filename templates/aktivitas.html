{% extends "layout.html" %}
{% block title %}Aktivitas - Recap Hardware{% endblock %}
{% block header_title %}Log Aktivitas{% endblock %}
{% block content %}

<div class="filters" style="margin-bottom:20px;">
    <select id="filterTipe" class="form-control" onchange="loadAktivitas()">
        <option value="">Semua Tipe</option>
        <option value="tambah">Tambah</option>
        <option value="edit">Edit</option>
        <option value="hapus">Hapus</option>
        <option value="pindah">Pindah</option>
        <option value="peminjaman">Peminjaman</option>
        <option value="pengembalian">Pengembalian</option>
        <option value="maintenance">Maintenance</option>
        <option value="selesai_maintenance">Selesai Maintenance</option>
        <option value="tambah_user">Tambah User</option>
        <option value="edit_user">Edit User</option>
        <option value="hapus_user">Hapus User</option>
        <option value="nonaktif_user">Nonaktif User</option>
    </select>
</div>

<div class="card">
    <div class="table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Tipe</th>
                    <th>Deskripsi</th>
                    <th>User</th>
                </tr>
            </thead>
            <tbody id="aktivitasTable"></tbody>
        </table>
    </div>
    <div class="empty-state" id="emptyMsg" style="display:none;">
        <div class="empty-state-icon">📋</div>
        <div class="empty-state-text">Belum ada aktivitas</div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="/static/js/aktivitas.js"></script>
{% endblock %}
