<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Recap Hardware{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% block navbar %}{% include 'partials/navbar.html' %}{% endblock %}

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- TOAST -->
    <div class="toast"></div>

    <script src="/static/js/auth.js"></script>
    {% block scripts %}{% endblock %}

    <script>
        // Display user name in navbar & show admin-only links
        async function initNavbar() {
            const user = Auth.getUser();
            if (user) {
                document.getElementById('userDisplay').textContent = user.nama_lengkap || user.username;
                if (user.role === 'admin') {
                    document.getElementById('adminLink').style.display = '';
                    document.getElementById('cabangLink').style.display = '';
                }
            } else {
                // User not in localStorage yet, try fetching from API
                try {
                    await Auth.fetchMe();
                    const freshUser = Auth.getUser();
                    if (freshUser) {
                        document.getElementById('userDisplay').textContent = freshUser.nama_lengkap || freshUser.username;
                        if (freshUser.role === 'admin') {
                            document.getElementById('adminLink').style.display = '';
                            document.getElementById('cabangLink').style.display = '';
                        }
                    }
                } catch (e) {
                    // not logged in, stay on login
                }
            }
        }
        initNavbar();
    </script>
</body>
</html>
