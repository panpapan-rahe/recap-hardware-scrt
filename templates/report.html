{% extends "layout.html" %}
{% block title %}Report - Recap Hardware{% endblock %}
{% block header_title %}Report{% endblock %}
{% block content %}

<div class="filters" style="margin-bottom:20px;">
    <select id="filterCabang" class="form-control" onchange="loadReport()">
        <option value="">Semua Cabang</option>
    </select>
    <select id="filterKategori" class="form-control" onchange="loadReport()">
        <option value="">Semua Kategori</option>
    </select>
    <select id="filterStatus" class="form-control" onchange="loadReport()">
        <option value="">Semua Status</option>
        <option value="aktif">Aktif</option>
        <option value="dipinjam">Dipinjam</option>
        <option value="maintenance">Maintenance</option>
        <option value="mutasi">Mutasi</option>
        <option value="retired">Retired</option>
    </select>
    <button onclick="exportCSV()" class="btn btn-success">⬇ Export CSV</button>
    <button onclick="exportPDF()" class="btn btn-danger">⬇ Export PDF</button>
</div>

<div class="card">
    <div class="table-container">
        <table class="data-table" id="reportTable">
            <thead>
                <tr>
                    <th>Kode</th>
                    <th>Nama</th>
                    <th>Kategori</th>
                    <th>Merk/Type</th>
                    <th>Cabang</th>
                    <th>Status</th>
                    <th>Lokasi</th>
                </tr>
            </thead>
            <tbody id="reportTableBody">
                <tr><td colspan="7" class="text-muted text-center">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="/static/js/report.js"></script>
{% endblock %}
