<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Recap Hardware</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-icon">RH</div>
            <div class="login-logo-text">Recap Hardware</div>
        </div>

        <div class="login-error" id="loginError"></div>

        <form id="loginForm">
            <div class="form-group" style="margin-bottom:16px;">
                <label>Username</label>
                <input type="text" id="username" class="form-control" placeholder="Masukkan username" required>
            </div>
            <div class="form-group" style="margin-bottom:20px;">
                <label>Password</label>
                <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;" id="loginBtn">Login</button>
        </form>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/static/js/auth.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    errorEl.style.display = 'none';
    btn.textContent = 'Memproses...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });

        const data = await res.json();

        if (!res.ok) {
            errorEl.textContent = data.detail || 'Login gagal';
            errorEl.style.display = 'block';
            return;
        }

        Auth.setToken(data.access_token);
        window.location.href = '/dashboard.html';
    } catch (err) {
        errorEl.textContent = 'Gagal terhubung ke server';
        errorEl.style.display = 'block';
    } finally {
        btn.textContent = 'Login';
        btn.disabled = false;
    }
});
</script>
</body>
</html>
